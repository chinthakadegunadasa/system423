name: System 423 Auto-Publishing

on:
  push:
    paths:
      - 'src/**'  # src තුළ වෙනසක් වූ විට පමණක් ක්‍රියාත්මක වේ
    branches:
      - main

jobs:
  build-book:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended

      - name: Compile Full Book (B5 PDF)
        run: |
          # src තුළ ඇති සියලුම .md ගොනු අකාරාදී පිළිවෙළට ගෙන තනි PDF එකක් සාදයි
          pandoc src/*.md -o output/System423_Full_B5.pdf \
          --pdf-engine=xelatex \
          -V geometry:"paperwidth=176mm, paperheight=250mm, margin=20mm" \
          -V mainfont="DejaVu Serif" \
          --variable=alignment:justified \
          --toc  # පටුන (Table of Contents) ස්වයංක්‍රීයව එක් කරයි

      - name: Compile Full Book (Docx)
        run: |
          pandoc src/*.md -o output/System423_Full_Draft.docx

      - name: Archive Production Files
        uses: actions/upload-artifact@v3
        with:
          name: System-423-Final-Build
          path: output/
        
